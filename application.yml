# services/data-processor/src/main/resources/application.yml

spring:
  application:
    name: nexus-data-processor

  # ── PostgreSQL ──────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nexus}
    username: ${POSTGRES_USER:nexus}
    password: ${POSTGRES_PASSWORD:nexus_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate  # Use Prisma for migrations — never auto-create
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── MongoDB ──────────────────────────────────────────────────
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://nexus:nexus_secret@localhost:27017/nexus_logs}

    # ── Redis ────────────────────────────────────────────────────
    redis:
      url: ${REDIS_URL:redis://:nexus_secret@localhost:6379}
      timeout: 2000ms

  # ── GraphQL ──────────────────────────────────────────────────
  graphql:
    graphiql:
      enabled: ${GRAPHIQL_ENABLED:false}
    path: /graphql

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    connection-timeout: 30s

# ── Actuator (Prometheus) ─────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ── OpenAPI / Swagger ─────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
  show-actuator: false

# ── Sentry ────────────────────────────────────────────────────
sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.2

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.nexus: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
