version: "3.9"

# ============================================================
# Project Nexus — Docker Compose (Local Dev)
# Usage: docker compose up -d
# ============================================================

networks:
  nexus-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  grafana_data:

services:
  # ── Databases ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: nexus-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-nexus}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-nexus_secret}
      MONGO_INITDB_DATABASE: nexus_logs
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks: [nexus-net]

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexus_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [nexus-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Services ────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
      target: development
    container_name: nexus-api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_secret}@postgres:5432/${POSTGRES_DB:-nexus}
      MONGO_URI: mongodb://${MONGO_USER:-nexus}:${MONGO_PASSWORD:-nexus_secret}@mongo:27017/nexus_logs
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus_secret}@redis:6379
      NODE_ENV: development
    ports:
      - "4000:4000"     # REST + GraphQL
      - "4001:4001"     # gRPC
    volumes:
      - ./services/api-gateway/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [nexus-net]

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: nexus-ai-service
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"     # FastAPI REST
      - "50051:50051"   # gRPC
    volumes:
      - ./services/ai-service/app:/app/app
    networks: [nexus-net]

  data-processor:
    build:
      context: ./services/data-processor
      dockerfile: Dockerfile
    container_name: nexus-data-processor
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"     # Spring Boot
    networks: [nexus-net]

  # ── Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nexus-nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on: [api-gateway, ai-service]
    networks: [nexus-net]

  # ── Observability ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: nexus-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [nexus-net]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: nexus-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on: [prometheus]
    networks: [nexus-net]

  # ── Dev Tools ───────────────────────────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: nexus-adminer
    restart: unless-stopped
    ports:
      - "8888:8080"
    networks: [nexus-net]
