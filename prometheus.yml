# infra/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "nexus"
    environment: "${ENVIRONMENT:-development}"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:4000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  - job_name: "ai-service"
    static_configs:
      - targets: ["ai-service:8000"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  - job_name: "data-processor"
    static_configs:
      - targets: ["data-processor:8080"]
    metrics_path: "/actuator/prometheus"
    scrape_interval: 15s

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:9113"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
